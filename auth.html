<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — IELTS with Kee</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #F5F5F7 0%, #EDE9F6 100%);
      padding: 20px;
    }
    .auth-card {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      text-align: center;
    }
    .auth-card .logo {
      font-size: 3rem;
      margin-bottom: 8px;
    }
    .auth-card h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 4px;
      color: #1D1D1F;
    }
    .auth-card p.sub {
      color: #86868B;
      font-size: 0.95rem;
      margin-bottom: 32px;
    }
    .auth-tabs {
      display: flex;
      gap: 4px;
      background: #F5F5F7;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: transparent;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      color: #86868B;
      transition: all 0.2s;
    }
    .auth-tab.active {
      background: white;
      color: #9F44D3;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .auth-form {
      display: none;
      text-align: left;
    }
    .auth-form.active {
      display: block;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #E5E5EA;
      border-radius: 12px;
      font-size: 1rem;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .form-group input:focus {
      border-color: #9F44D3;
      outline: none;
    }
    .btn-auth {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #9F44D3, #B265E6);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 8px;
    }
    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(159, 68, 211, 0.3);
    }
    .btn-auth:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .auth-error {
      background: #FFF0F2;
      color: #C02E3F;
      padding: 12px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
    .auth-success {
      display: none;
      text-align: center;
      padding: 20px 0;
    }
    .auth-success .check {
      font-size: 4rem;
      margin-bottom: 16px;
    }
    .auth-footer {
      margin-top: 24px;
      font-size: 0.85rem;
      color: #86868B;
    }
    .auth-footer a {
      color: #9F44D3;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #86868B;
      text-decoration: none;
      font-size: 0.85rem;
    }
    .back-link:hover {
      color: #9F44D3;
    }
    .password-hint {
      font-size: 0.78rem;
      color: #aaa;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo">🦄</div>
      <h1>IELTS with Kee</h1>
      <p class="sub">Sign in to track your learning journey</p>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('signin')">Sign In</button>
        <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <div id="auth-error" class="auth-error"></div>
      <div id="auth-success" class="auth-success">
        <div class="check">✅</div>
        <h3>Success!</h3>
        <p id="success-msg" style="color:#86868B;margin-top:8px;"></p>
      </div>

      <!-- Sign In Form -->
      <form id="signin-form" class="auth-form active" onsubmit="handleSignIn(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signin-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signin-password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn-auth" id="signin-btn">Sign In</button>
        <div class="auth-footer">
          Don't have an account? <a onclick="switchTab('signup')">Sign up</a>
        </div>
      </form>

      <!-- Sign Up Form -->
      <form id="signup-form" class="auth-form" onsubmit="handleSignUp(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signup-name" placeholder="e.g. Alex Chen" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="At least 6 characters" minlength="6" required>
          <div class="password-hint">Must be at least 6 characters</div>
        </div>
        <button type="submit" class="btn-auth" id="signup-btn">Create Account</button>
        <div class="auth-footer">
          Already have an account? <a onclick="switchTab('signin')">Sign in</a>
        </div>
      </form>

      <a href="index.html" class="back-link">← Back to Home</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://areedjmpngwzocqpoaur.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFyZWVkam1wbmd3em9jcXBvYXVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5ODAwMTgsImV4cCI6MjA5MjU1NjAxOH0.CSHpruDqBm4mbKseySbbOlZk2-uBG2Oxe4DvqwTVFJ8';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('auth-error').style.display = 'none';
    }

    function switchTab(tab) {
      hideError();
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      if (tab === 'signin') {
        document.querySelector('.auth-tab:first-child').classList.add('active');
        document.getElementById('signin-form').classList.add('active');
      } else {
        document.querySelector('.auth-tab:last-child').classList.add('active');
        document.getElementById('signup-form').classList.add('active');
      }
    }

    async function handleSignUp(e) {
      e.preventDefault();
      hideError();
      const btn = document.getElementById('signup-btn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;

      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          data: { full_name: name }
        }
      });

      btn.disabled = false;
      btn.textContent = 'Create Account';

      if (error) {
        showError(error.message);
        return;
      }

      // Show success
      document.getElementById('signup-form').style.display = 'none';
      document.getElementById('auth-success').style.display = 'block';
      document.getElementById('success-msg').textContent = 
        'Account created! Check your email for a confirmation link to sign in.';
    }

    async function handleSignIn(e) {
      e.preventDefault();
      hideError();
      const btn = document.getElementById('signin-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      const email = document.getElementById('signin-email').value;
      const password = document.getElementById('signin-password').value;

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      btn.disabled = false;
      btn.textContent = 'Sign In';

      if (error) {
        showError(error.message);
        return;
      }

      // Redirect to dashboard
      window.location.href = 'dashboard.html';
    }

    // Check if already signed in
    (async function() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        window.location.href = 'dashboard.html';
      }
    })();
  </script>
</body>
</html>
