<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access — IELTS with Kee</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #F5F5F7 0%, #EDE9F6 100%);
      padding: 20px;
    }
    .auth-card {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      text-align: center;
    }
    .auth-card .logo {
      font-size: 3rem;
      margin-bottom: 8px;
    }
    .auth-card h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 4px;
      color: #1D1D1F;
    }
    .auth-card p.sub {
      color: #86868B;
      font-size: 0.95rem;
      margin-bottom: 32px;
    }
    .form-group {
      margin-bottom: 18px;
      text-align: left;
    }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #E5E5EA;
      border-radius: 12px;
      font-size: 1rem;
      transition: border-color 0.2s;
      box-sizing: border-box;
      font-family: monospace;
      letter-spacing: 2px;
      text-align: center;
    }
    .form-group input:focus {
      border-color: #9F44D3;
      outline: none;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: #86868B;
    }
    .checkbox-group input {
      width: 16px; height: 16px;
    }
    .btn-auth {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #9F44D3, #B265E6);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(159, 68, 211, 0.3);
    }
    .auth-error {
      background: #FFF0F2;
      color: #C02E3F;
      padding: 12px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
    .auth-success {
      display: none;
      text-align: center;
      padding: 20px 0;
    }
    .auth-success .check {
      font-size: 4rem;
      margin-bottom: 16px;
      animation: bounceIn 0.5s ease;
    }
    @keyframes bounceIn {
      0% { transform: scale(0); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #86868B;
      text-decoration: none;
      font-size: 0.85rem;
    }
    .back-link:hover { color: #9F44D3; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo">🦄</div>
      <h1>IELTS with Kee</h1>
      <p class="sub">Enter your access code to continue</p>

      <div id="auth-error" class="auth-error"></div>
      <div id="auth-success" class="auth-success">
        <div class="check">✅</div>
        <h3>Access Granted</h3>
        <p style="color:#86868B;margin-top:8px;" id="success-msg">Redirecting...</p>
      </div>

      <form id="auth-form" onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label>Access Code</label>
          <input type="password" id="passcode" placeholder="Enter code" autofocus autocomplete="off">
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="remember">
          <label for="remember">Stay signed in for 30 days</label>
        </div>
        <button type="submit" class="btn-auth">Unlock →</button>
      </form>

      <a href="index.html" class="back-link">← Back to Home</a>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // If already logged in, redirect immediately
    if (KeeAuth.isLoggedIn()) {
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect') || 'dashboard.html';
      window.location.href = redirect;
    }

    function showError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function handleSubmit(e) {
      e.preventDefault();
      const error = document.getElementById('auth-error');
      error.style.display = 'none';

      const code = document.getElementById('passcode').value;
      const remember = document.getElementById('remember').checked;
      const result = KeeAuth.login(code, remember);

      if (!result.ok) {
        showError(result.error);
        document.getElementById('passcode').value = '';
        document.getElementById('passcode').focus();
        return;
      }

      // Success animation
      document.getElementById('auth-form').style.display = 'none';
      document.getElementById('auth-success').style.display = 'block';

      const params = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect') || 'dashboard.html';

      setTimeout(() => {
        window.location.href = redirect;
      }, 800);
    }
  </script>
</body>
</html>
