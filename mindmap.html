<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IELTS Speaking Mindmap — IELTS with Kee</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    #mindmap-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      font-size: 1.2rem;
      color: var(--gray-600);
      flex-direction: column;
      gap: 16px;
    }

    #mindmap-loading .loader {
      width: 40px;
      height: 40px;
      border: 4px solid var(--gray-200);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #mindmap-container {
      display: none;
    }

    #mindmap-container.ready {
      display: block;
    }

    .mindmap-info-bar {
      background: var(--gray-100);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 0.85rem;
      color: var(--gray-700);
    }

    .mindmap-info-bar .info-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mindmap-info-bar .info-right {
      display: flex;
      gap: 8px;
    }

    .error-msg {
      text-align: center;
      padding: 60px 20px;
      font-size: 1.1rem;
      color: var(--gray-600);
    }

    .error-msg .error-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 12px;
    }

    .mm-root-label {
      box-shadow: 0 4px 16px rgba(159, 68, 211, 0.3);
    }
  </style>
</head>
<body>
  <!-- Navigation injected by js/navigation.js -->

  <div class="page-title-bar">
    <h1>🧠 IELTS Speaking Mindmap</h1>
    <p>Complete syllabus visualization — Structure, Grading, Vocabulary &amp; more</p>
  </div>

  <div class="mindmap-container section" style="padding-top:30px;">

    <div id="mindmap-loading">
      <div class="loader"></div>
      <span>Loading mindmap data...</span>
    </div>

    <div id="mindmap-container"></div>
  </div>

  <footer class="site-footer">
    <p>
      <span class="footer-brand">IELTS with Kee</span>
      <span class="footer-unicorn"> 🦄 </span>
      Built with 🍌 Nano Banana energy
    </p>
  </footer>

  <script src="js/navigation.js"></script>
  <script src="js/mindmap-renderer.js"></script>
  <script>
    (async function loadMindmap() {
      const loadingEl = document.getElementById('mindmap-loading');
      const containerEl = document.getElementById('mindmap-container');

      try {
        const resp = await fetch('ielts-speaking-mindmap.json');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
        const data = await resp.json();

        // Hide loading, show container
        loadingEl.style.display = 'none';
        containerEl.classList.add('ready');

        // Render using the mindmap renderer
        window.MindmapRenderer.render(containerEl, data);

      } catch (err) {
        loadingEl.innerHTML = `
          <div class="error-msg">
            <span class="error-icon">⚠️</span>
            <strong>Could not load mindmap data.</strong><br>
            <span style="font-size:0.85rem;color:var(--gray-500);">${err.message}</span>
            <br><br>
            <a href="index.html" class="btn btn-outline">← Back to Home</a>
          </div>
        `;
        console.error('Mindmap load error:', err);
      }
    })();
  </script>
</body>
</html>
